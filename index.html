<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3A Perú | Gestión de Inventarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --surface: #1a1a1a;
            --accent-blue: #0056b3; /* Azul 3A */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* CONTENEDOR DE TRANSICIÓN */
        .app-container { position: relative; width: 100%; height: 100%; }
        .view { 
            position: absolute; width: 100%; height: 100%; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; opacity: 0; visibility: hidden; 
        }
        .view.active { opacity: 1; visibility: visible; }

        /* LOGIN VIEW */
        .login-view { justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .login-card { background: var(--surface); padding: 3rem; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #333; text-align: center; }
        .brand-logo { width: 120px; margin-bottom: 2rem; }
        
        select, input { 
            width: 100%; padding: 14px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; outline: none;
        }
        select:focus, input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(0,86,179,0.3); }

        .btn-access { 
            background: var(--accent-blue); color: white; border: none; padding: 15px; 
            border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s;
        }
        .btn-access:hover { background: #004494; transform: translateY(-2px); }

        /* MAIN APP VIEW */
        .main-view { background: var(--bg-dark); }
        .header { height: 70px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; border-bottom: 1px solid #333; }
        
        .content { padding: 2rem; overflow-y: auto; flex: 1; }

        /* TABLA ESTILO 3A */
        .table-card { background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--accent-blue); }
        th { padding: 15px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #333; }
        
        .input-inline { background: transparent; border: none; border-bottom: 1px solid #444; width: 100%; padding: 5px; color: white; }
        .input-inline:focus { border-bottom-color: var(--accent-blue); }

        .diff-tag { font-weight: 800; padding: 4px 8px; border-radius: 4px; font-size: 0.9rem; }
        .diff-neg { color: var(--danger); }
        .diff-pos { color: #4ade80; }

        .btn-add { color: var(--accent-blue); background: none; border: none; cursor: pointer; font-weight: 700; margin-top: 1rem; padding: 10px; }

        /* ANIMACIÓN DE SALIDA */
        .slide-up { transform: translateY(-30px); opacity: 0; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="viewLogin" class="view login-view active">
            <div class="login-card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfU6Lp_4y-6PjO5H45XoZ6pXfW4qj9N6O7Ag&s" alt="Logo 3A" class="brand-logo">
                <h2 style="margin-bottom: 1.5rem;">Gestión de Ajustes</h2>
                
                <select id="tiendaSelect">
                    <option value="">Seleccione Tienda...</option>
                    </select>
                
                <input type="password" id="tiendaPin" placeholder="PIN de Seguridad">
                
                <button class="btn-access" onclick="ingresarApp()">INGRESAR AL SISTEMA</button>
                <p id="loginError" style="color: var(--danger); font-size: 0.8rem; margin-top: 1rem;"></p>
            </div>
        </div>

        <div id="viewMain" class="view main-view">
            <div class="header">
                <div style="display:flex; align-items:center; gap:15px;">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfU6Lp_4y-6PjO5H45XoZ6pXfW4qj9N6O7Ag&s" height="30">
                    <h3 id="labelTiendaActiva">Tienda 000</h3>
                </div>
                <button onclick="cerrarSesion()" style="background:none; border:1px solid #444; color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">Cerrar</button>
            </div>

            <div class="content">
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Descripción</th>
                                <th>St. Kallpa</th>
                                <th>St. Físico</th>
                                <th>Diferencia</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                            </tbody>
                    </table>
                </div>
                <button class="btn-add" onclick="agregarFila()">+ AGREGAR PRODUCTO</button>
            </div>
        </div>

    </div>

<script>
const SUPABASE_URL = 'https://pjoiiygbuzwzlenwewnj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqb2lpeWdidXp3emxlbndld25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjE1MzgsImV4cCI6MjA5MDIzNzUzOH0.VPl0IUwTjmf4K1HWoY6kmXNG-dHHrX-O0t9_-UivGWg';

let tiendasCache = [];

async function init() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tiendas?select=*&order=codigo.asc`, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    tiendasCache = await res.json();
    const select = document.getElementById('tiendaSelect');
    tiendasCache.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.codigo;
        opt.innerText = `${t.codigo} - ${t.nombre}`;
        select.appendChild(opt);
    });
}

function ingresarApp() {
    const cod = document.getElementById('tiendaSelect').value;
    const pin = document.getElementById('tiendaPin').value;
    const tienda = tiendasCache.find(t => t.codigo == cod);

    if (tienda && tienda.pin == pin) {
        document.getElementById('labelTiendaActiva').innerText = `📍 ${tienda.nombre} (${tienda.codigo})`;
        document.getElementById('viewLogin').classList.remove('active');
        document.getElementById('viewMain').classList.add('active');
        agregarFila();
    } else {
        document.getElementById('loginError').innerText = "Acceso denegado. Verifique sus datos.";
    }
}

function agregarFila() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td><input type="text" class="input-inline" placeholder="SKU" onblur="buscarProducto(this)"></td>
        <td class="desc-cell" style="color:#888">Cargando...</td>
        <td><input type="number" class="input-inline qty-kallpa" value="0" oninput="calcular(this)"></td>
        <td><input type="number" class="input-inline qty-fisico" value="0" oninput="calcular(this)"></td>
        <td class="diff-cell"><span class="diff-tag">0</span></td>
        <td><button onclick="this.closest('tr').remove()" style="color:var(--danger); background:none; border:none; cursor:pointer;">✕</button></td>
    `;
    document.getElementById('inventoryBody').appendChild(tr);
}

async function buscarProducto(input) {
    const sku = input.value;
    const row = input.closest('tr');
    if(!sku) return;
    
    const res = await fetch(`${SUPABASE_URL}/rest/v1/productos?sku=eq.${sku}`, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    const data = await res.json();
    row.querySelector('.desc-cell').innerText = data[0]?.descripcion || "No encontrado";
}

function calcular(input) {
    const row = input.closest('tr');
    const k = parseFloat(row.querySelector('.qty-kallpa').value) || 0;
    const f = parseFloat(row.querySelector('.qty-fisico').value) || 0;
    const diff = f - k;
    const cell = row.querySelector('.diff-cell');
    cell.innerHTML = `<span class="diff-tag ${diff < 0 ? 'diff-neg' : 'diff-pos'}">${diff}</span>`;
}

function cerrarSesion() {
    location.reload();
}

init();
</script>
</body>
</html>
