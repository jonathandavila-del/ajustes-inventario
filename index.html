<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3A Perú | Gestión de Inventarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --3a-blue: #0056b3;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
            --success: #1ED760;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .stage { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .view { 
            position: absolute; width: 100%; height: 100%; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0; transform: scale(1.05); pointer-events: none;
        }
        .view.active { opacity: 1; transform: scale(1); pointer-events: all; }

        /* LOGIN */
        .view-login { display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .login-box { background: var(--card); padding: 2rem; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #222; }
        .logo-3a { width: 100px; margin-bottom: 1.5rem; }
        
        select, input { 
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; 
            color: white; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; outline: none;
        }

        /* TABLA COMPACTA PROFESIONAL */
        .nav-bar { height: 60px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 1.5rem; border-bottom: 1px solid #222; }
        .main-content { padding: 1rem; flex: 1; overflow-y: auto; max-width: 850px; margin: 0 auto; width: 100%; }
        
        .table-container { background: var(--card); border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        thead { background: var(--3a-blue); }
        th { padding: 10px; text-align: left; text-transform: uppercase; }
        td { padding: 8px 10px; border-bottom: 1px solid #222; }

        .sku-group { display: flex; align-items: center; gap: 5px; }
        .btn-scan { background: #333; border: none; color: white; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }

        .btn-main { 
            background: var(--3a-blue); color: white; border: none; padding: 12px; 
            border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
        }

        /* RESUMEN (TICKET) */
        .ticket { background: white; color: black; padding: 2rem; border-radius: 5px; font-family: monospace; max-width: 450px; margin: 2rem auto; }
        .ticket h2 { border-bottom: 2px dashed black; padding-bottom: 10px; margin-bottom: 10px; text-align: center; }

        #reader { width: 100%; max-width: 300px; margin: 0 auto; }
        .exit-up { transform: translateY(-100%) !important; opacity: 0 !important; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="loginView" class="view view-login active">
            <div class="login-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfU6Lp_4y-6PjO5H45XoZ6pXfW4qj9N6O7Ag&s" class="logo-3a">
                <select id="selRol">
                    <option value="">Seleccione Tienda / Rol</option>
                    <option value="zonal">Supervisión Zonal</option>
                    <optgroup label="Tiendas" id="optTiendas"></optgroup>
                </select>
                <input type="password" id="txtPin" placeholder="PIN de Seguridad">
                <button class="btn-main" onclick="entrar()">Ingresar</button>
            </div>
        </div>

        <div id="appView" class="view">
            <div class="nav-bar">
                <span id="labelUser" style="font-weight:700; font-size:0.8rem;">Tienda</span>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.7rem;">Cerrar</button>
            </div>

            <div class="main-content">
                <h3 style="margin-bottom: 1rem; font-weight: 800;">Ajuste de Inventario</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 120px;">SKU</th>
                                <th>Descripción</th>
                                <th>Kallpa</th>
                                <th>Físico</th>
                                <th>Dif.</th>
                            </tr>
                        </thead>
                        <tbody id="tablaBody"></tbody>
                    </table>
                </div>
                <button onclick="nuevaFila()" style="background:none; border:1px dashed #444; color:var(--text-dim); width:100%; padding:10px; margin-top:10px; cursor:pointer; font-size:0.7rem;">+ Añadir SKU</button>
                <button class="btn-main" style="margin-top:1.5rem; background: var(--success); color: black;" onclick="finalizarSolicitud()">FINALIZAR SOLICITUD</button>
            </div>
        </div>

        <div id="ticketView" class="view" style="background: #000; overflow-y: auto;">
            <div class="ticket">
                <h2>3A PERÚ - RESUMEN</h2>
                <p><b>ID:</b> <span id="resId"></span></p>
                <p><b>Tienda:</b> <span id="resTienda"></span></p>
                <p><b>Fecha:</b> <span id="resFecha"></span></p>
                <hr style="margin: 10px 0; border: 1px dashed black;">
                <table style="width: 100%; color: black; font-size: 0.7rem;">
                    <thead><tr style="background:none; color:black;"><th>SKU</th><th>DESCRIPCIÓN</th><th style="text-align:right;">DIF</th></tr></thead>
                    <tbody id="resBody"></tbody>
                </table>
                <div style="text-align:center; margin-top:20px;">
                    <button class="btn-main" onclick="location.reload()">NUEVA SOLICITUD</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scannerArea" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; justify-content:center;">
        <div id="reader"></div>
        <button onclick="cerrarEscaner()" style="margin-top:20px; color:white; background:red; border:none; padding:10px; border-radius:5px;">Cerrar Cámara</button>
    </div>

<script>
const SB_URL = 'https://pjoiiygbuzwzlenwewnj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqb2lpeWdidXp3emxlbndld25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjE1MzgsImV4cCI6MjA5MDIzNzUzOH0.VPl0IUwTjmf4K1HWoY6kmXNG-dHHrX-O0t9_-UivGWg';

let dbTiendas = [];
let html5QrCode;

async function init() {
    const r = await fetch(`${SB_URL}/rest/v1/tiendas?select=*&order=codigo.asc`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
    dbTiendas = await r.json();
    document.getElementById('optTiendas').innerHTML = dbTiendas.map(t => `<option value="${t.codigo}">${t.codigo} - ${t.nombre}</option>`).join('');
}

function entrar() {
    const rol = document.getElementById('selRol').value;
    const pin = document.getElementById('txtPin').value;
    const t = dbTiendas.find(x => x.codigo == rol);

    if ((t && t.pin == pin) || (rol === 'zonal' && pin === '3A2026')) {
        document.getElementById('labelUser').innerText = t ? t.nombre : "MODO ZONAL";
        document.getElementById('loginView').classList.add('exit-up');
        setTimeout(() => { 
            document.getElementById('loginView').classList.remove('active'); 
            document.getElementById('appView').classList.add('active'); 
            nuevaFila(); 
        }, 400);
    } else { alert("Acceso Incorrecto"); }
}

function nuevaFila() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td><div class="sku-group"><input type="text" class="sku-input" placeholder="SKU" onblur="fetchProd(this)"><button class="btn-scan" onclick="abrirEscaner(this)">📷</button></div></td>
        <td class="td-desc" style="color:var(--text-dim); font-size:0.7rem;">---</td>
        <td><input type="number" class="qty-k" value="0" oninput="calc(this)" style="width:40px;"></td>
        <td><input type="number" class="qty-f" value="0" oninput="calc(this)" style="width:40px;"></td>
        <td class="td-diff"><span class="badge-diff">0</span></td>
    `;
    document.getElementById('tablaBody').appendChild(tr);
}

// TU FUNCIÓN MODIFICADA PARA GUARDAR EN 'solicitudes' Y MOSTRAR RESUMEN
async function finalizarSolicitud() {
    const filas = document.querySelectorAll('#tablaBody tr');
    const datosSolicitud = [];
    const resumenItems = [];

    filas.forEach(fila => {
        const sku = fila.querySelector('.sku-input').value;
        const diff = fila.querySelector('.badge-diff').innerText;
        const desc = fila.querySelector('.td-desc').innerText;
        
        if(sku && desc !== "---") {
            const item = {
                tienda: document.getElementById('labelUser').innerText,
                sku: sku,
                diferencia: parseInt(diff),
                fecha: new Date().toISOString()
            };
            datosSolicitud.push(item);
            resumenItems.push({sku, desc, diff});
        }
    });

    if (datosSolicitud.length === 0) return alert("No hay datos válidos");

    const response = await fetch(`${SB_URL}/rest/v1/solicitudes`, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(datosSolicitud)
    });

    if(response.ok) {
        // MOSTRAR TICKET RESUMEN
        document.getElementById('appView').classList.remove('active');
        document.getElementById('ticketView').classList.add('active');
        document.getElementById('resId').innerText = "SOL-" + Math.floor(Math.random()*1000000);
        document.getElementById('resTienda').innerText = document.getElementById('labelUser').innerText;
        document.getElementById('resFecha').innerText = new Date().toLocaleString();
        document.getElementById('resBody').innerHTML = resumenItems.map(i => `<tr><td>${i.sku}</td><td>${i.desc}</td><td style="text-align:right;">${i.diff}</td></tr>`).join('');
    } else {
        alert("❌ Error al guardar en base de datos.");
    }
}

// ESCANER
function abrirEscaner(btn) {
    const input = btn.parentElement.querySelector('.sku-input');
    document.getElementById('scannerArea').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        input.value = text;
        fetchProd(input);
        cerrarEscaner();
    });
}
function cerrarEscaner() { if(html5QrCode) html5QrCode.stop(); document.getElementById('scannerArea').style.display = 'none'; }

async function fetchProd(input) {
    const r = await fetch(`${SB_URL}/rest/v1/productos?sku=eq.${input.value}`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
    const data = await r.json();
    input.closest('tr').querySelector('.td-desc').innerText = data[0] ? data[0].descripcion : "No encontrado";
    calc(input);
}

function calc(input) {
    const row = input.closest('tr');
    const k = parseFloat(row.querySelector('.qty-k').value) || 0;
    const f = parseFloat(row.querySelector('.qty-f').value) || 0;
    const d = f - k;
    const badge = row.querySelector('.badge-diff');
    badge.innerText = d;
    badge.style.color = d < 0 ? 'var(--danger)' : d > 0 ? 'var(--success)' : 'white';
}

init();
</script>
</body>
</html>
