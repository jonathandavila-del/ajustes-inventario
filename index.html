<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockMaster | Spotify Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-elevated: #282828;
            --text-base: #FFFFFF;
            --text-subdued: #A7A7A7;
            --accent-green: #1ED760;
            --sidebar-width: 240px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-base); color: var(--text-base); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width); background: #000; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; border-right: 1px solid #282828; }
        .nav-brand { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-brand span { color: var(--accent-green); }
        .nav-link { color: var(--text-subdued); text-decoration: none; font-weight: 700; transition: 0.2s; display: flex; align-items: center; gap: 15px; padding: 10px 0; font-size: 0.9rem; }
        .nav-link:hover, .nav-link.active { color: #fff; }

        /* MAIN PANEL */
        .main-panel { flex: 1; background: linear-gradient(180deg, #1e1e1e 0%, #121212 100%); overflow-y: auto; position: relative; }
        
        .top-bar { height: 64px; display: flex; justify-content: flex-end; align-items: center; padding: 0 2rem; background: rgba(0,0,0,0.3); sticky: top; }
        .btn-user { background: rgba(0,0,0,0.7); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; border: 1px solid #333; }

        .content { padding: 2rem; }
        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 1.5rem; letter-spacing: -1px; }

        /* GRID DE TIENDAS (COMO ALBUMES) */
        .grid-tiendas { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
        .tienda-card { 
            background: #181818; padding: 1rem; border-radius: 8px; transition: 0.3s; cursor: pointer; 
            border: 1px solid transparent;
        }
        .tienda-card:hover { background: #282828; transform: translateY(-5px); }
        .tienda-img { 
            width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #333, #111); 
            border-radius: 6px; margin-bottom: 1rem; display: flex; align-items: center; 
            justify-content: center; font-size: 3rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .tienda-card h3 { font-size: 1rem; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        .tienda-card p { font-size: 0.85rem; color: var(--text-subdued); }

        /* SECCIÓN PIN (MODAL STYLE) */
        .pin-view { display: none; max-width: 400px; margin: 4rem auto; text-align: center; background: var(--bg-surface); padding: 3rem; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid #333; }
        .pin-view.active { display: block; animation: fadeIn 0.3s ease; }
        .pin-input { background: #333; border: 1px solid #444; color: white; font-size: 2.5rem; text-align: center; width: 200px; padding: 10px; border-radius: 8px; margin: 20px 0; letter-spacing: 10px; }
        .btn-confirm { background: var(--accent-green); color: black; border: none; padding: 12px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn-confirm:hover { transform: scale(1.04); background: #1fdf64; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-brand" onclick="goHome()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#1ED760"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.492 17.302c-.215.353-.674.464-1.026.249-2.853-1.743-6.444-2.138-10.672-1.173-.404.092-.81-.158-.903-.562-.093-.404.158-.811.562-.904 4.636-1.06 8.59-.61 11.789 1.344.353.216.464.675.25 1.026zm1.465-3.264c-.27.44-.846.577-1.287.307-3.266-2.008-8.245-2.59-12.106-1.417-.497.151-1.022-.128-1.173-.625-.151-.498.128-1.023.626-1.173 4.417-1.341 9.904-.69 13.633 1.605.441.27.578.847.307 1.288zm.135-3.398c-3.918-2.327-10.375-2.542-14.123-1.405-.6.182-1.24-.163-1.423-.763-.182-.6.163-1.24.763-1.423 4.314-1.31 11.442-1.055 15.968 1.631.54.32.716 1.015.396 1.554-.32.539-1.015.715-1.554.396z"/></svg>
            Stock<span>Master</span>
        </div>
        <a href="#" class="nav-link active" onclick="goHome()">Inicio</a>
        <a href="#" class="nav-link" onclick="alert('Historial próximamente')">Tu Biblioteca</a>
    </div>

    <div class="main-panel">
        <div class="top-bar">
            <button class="btn-user">Usuario Invitado</button>
        </div>

        <div class="content">
            <div id="viewLanding" class="view active">
                <h1>Tus Tiendas</h1>
                <div id="tiendasGrid" class="grid-tiendas">
                    <p style="color: var(--text-subdued)">Cargando inventario...</p>
                </div>
            </div>

            <div id="viewPin" class="pin-view">
                <h2 id="pinTiendaNombre">Nombre Tienda</h2>
                <p id="pinTiendaCodigo" style="color: var(--text-subdued)">Código: 000</p>
                <input type="password" id="inputPin" class="pin-input" maxlength="4" placeholder="••••">
                <button class="btn-confirm" onclick="validarPin()">Entrar</button>
                <p id="pinError" style="color: #ff4d4d; margin-top: 15px; font-weight: 700;"></p>
                <button onclick="goHome()" style="background:none; border:none; color:var(--text-subdued); margin-top:20px; cursor:pointer; text-decoration:underline;">Cancelar</button>
            </div>

            <div id="viewFormulario" class="view" style="display:none; text-align:center; padding-top: 5rem;">
                <h1 id="titleTienda" style="color: var(--accent-green)">Panel Activo</h1>
                <p>Módulo de Ajustes de Inventario cargado correctamente.</p>
                <button class="btn-confirm" style="width:auto; margin-top:2rem;" onclick="goHome()">Cerrar Sesión</button>
            </div>
        </div>
    </div>

<script>
const SUPABASE_URL = 'https://pjoiiygbuzwzlenwewnj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqb2lpeWdidXp3emxlbndld25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjE1MzgsImV4cCI6MjA5MDIzNzUzOH0.VPl0IUwTjmf4K1HWoY6kmXNG-dHHrX-O0t9_-UivGWg';

let tiendasCache = [];
let tiendaActiva = null;

async function cargarTiendas() {
    const grid = document.getElementById('tiendasGrid');
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/tiendas?select=*&order=codigo.asc`, {
            headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
        });
        tiendasCache = await response.json();
        
        grid.innerHTML = tiendasCache.map(t => `
            <div class="tienda-card" onclick="pedirPin('${t.codigo}')">
                <div class="tienda-img">🏪</div>
                <h3>${t.nombre}</h3>
                <p>Tienda #${t.codigo}</p>
            </div>
        `).join('');
    } catch (e) {
        grid.innerHTML = '<p>Error al conectar con la base de datos.</p>';
    }
}

function pedirPin(codigo) {
    tiendaActiva = tiendasCache.find(t => t.codigo == codigo);
    document.getElementById('viewLanding').style.display = 'none';
    document.getElementById('viewPin').classList.add('active');
    document.getElementById('pinTiendaNombre').innerText = tiendaActiva.nombre;
    document.getElementById('pinTiendaCodigo').innerText = 'Código: ' + tiendaActiva.codigo;
    document.getElementById('inputPin').value = '';
    document.getElementById('pinError').innerText = '';
}

function validarPin() {
    const pinVal = document.getElementById('inputPin').value;
    if (tiendaActiva && tiendaActiva.pin == pinVal) {
        document.getElementById('viewPin').classList.remove('active');
        document.getElementById('viewPin').style.display = 'none';
        document.getElementById('viewFormulario').style.display = 'block';
        document.getElementById('titleTienda').innerText = "📍 " + tiendaActiva.nombre;
    } else {
        document.getElementById('pinError').innerText = "❌ PIN INCORRECTO";
    }
}

function goHome() {
    document.getElementById('viewLanding').style.display = 'block';
    document.getElementById('viewPin').classList.remove('active');
    document.getElementById('viewPin').style.display = 'none';
    document.getElementById('viewFormulario').style.display = 'none';
    tiendaActiva = null;
}

// Carga inicial
cargarTiendas();
</script>

</body>
</html>
