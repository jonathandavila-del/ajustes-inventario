<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3A Perú | Sistema de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --3a-blue: #0056b3;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .stage { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .view { 
            position: absolute; width: 100%; height: 100%; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0; transform: scale(1.05); pointer-events: none;
        }
        .view.active { opacity: 1; transform: scale(1); pointer-events: all; }

        /* LOGIN */
        .view-login { display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .login-box { background: var(--card); padding: 2.5rem; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #222; }
        .logo-3a { width: 130px; margin-bottom: 2rem; }
        
        select, input { 
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; 
            color: white; border-radius: 10px; margin-bottom: 1.2rem; font-size: 1rem; outline: none;
        }
        select:focus, input:focus { border-color: var(--3a-blue); }

        .btn-main { 
            background: var(--3a-blue); color: white; border: none; padding: 16px; 
            border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase;
        }

        /* APP */
        .nav-bar { height: 65px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 1.5rem; border-bottom: 1px solid #222; }
        .main-content { padding: 1.5rem; flex: 1; overflow-y: auto; max-width: 1100px; margin: 0 auto; width: 100%; }
        
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        thead { background: var(--3a-blue); font-size: 0.7rem; text-transform: uppercase; }
        th { padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        .sku-group { display: flex; align-items: center; gap: 8px; }
        .btn-scan { background: #333; border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; }

        .badge-diff { font-weight: 800; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
        .neg { color: var(--danger); background: rgba(255, 77, 77, 0.1); }
        .pos { color: #00ff88; background: rgba(0, 255, 136, 0.1); }

        /* MODAL ESCANER */
        #scanner-modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center;
        }
        #reader { width: 300px; border-radius: 10px; overflow: hidden; }

        .exit-up { transform: translateY(-100%) !important; opacity: 0 !important; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="loginView" class="view view-login active">
            <div class="login-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfU6Lp_4y-6PjO5H45XoZ6pXfW4qj9N6O7Ag&s" class="logo-3a">
                <h2 style="margin-bottom: 1.5rem;">Acceso al Sistema</h2>
                
                <select id="selRol" onchange="toggleLoginType()">
                    <option value="">Seleccione Rol...</option>
                    <optgroup label="Administración">
                        <option value="zonal">Supervisión Zonal</option>
                        <option value="audit">Auditoría Central</option>
                    </optgroup>
                    <optgroup label="Tiendas" id="optTiendas"></optgroup>
                </select>
                
                <input type="password" id="txtPin" placeholder="PIN / Contraseña">
                <button class="btn-main" onclick="entrar()">Ingresar</button>
                <p id="errLogin" style="color: var(--danger); font-size: 0.8rem; margin-top: 1rem;"></p>
            </div>
        </div>

        <div id="appView" class="view">
            <div class="nav-bar">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfU6Lp_4y-6PjO5H45XoZ6pXfW4qj9N6O7Ag&s" height="20">
                    <span id="labelUser" style="font-weight:700; font-size:0.9rem;">Tienda</span>
                </div>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">Cerrar</button>
            </div>

            <div class="main-content">
                <div style="margin-bottom: 1.5rem;">
                    <h2 id="viewTitle">Ajuste de Inventario</h2>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Descripción</th>
                                <th>Kallpa</th>
                                <th>Físico</th>
                                <th>Dif.</th>
                            </tr>
                        </thead>
                        <tbody id="tablaBody"></tbody>
                    </table>
                </div>
                <button onclick="nuevaFila()" style="background:none; border:1px dashed #444; color:var(--text-dim); width:100%; padding:15px; margin-top:10px; cursor:pointer;">+ Añadir Producto</button>
                <button class="btn-main" style="margin-top:2rem;" onclick="alert('Ticket Generado')">FINALIZAR AJUSTE</button>
            </div>
        </div>
    </div>

    <div id="scanner-modal">
        <div id="reader"></div>
        <button onclick="cerrarEscaner()" style="margin-top:20px; padding:10px 20px; background:var(--danger); border:none; color:white; border-radius:5px;">Cancelar</button>
    </div>

<script>
const SB_URL = 'https://pjoiiygbuzwzlenwewnj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqb2lpeWdidXp3emxlbndld25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjE1MzgsImV4cCI6MjA5MDIzNzUzOH0.VPl0IUwTjmf4K1HWoY6kmXNG-dHHrX-O0t9_-UivGWg';

let dbTiendas = [];
let html5QrCode;
let inputActualParaScan;

async function cargarTiendas() {
    const r = await fetch(`${SB_URL}/rest/v1/tiendas?select=*&order=codigo.asc`, {
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    dbTiendas = await r.json();
    document.getElementById('optTiendas').innerHTML = dbTiendas.map(t => `<option value="${t.codigo}">${t.codigo} - ${t.nombre}</option>`).join('');
}

function entrar() {
    const rol = document.getElementById('selRol').value;
    const pin = document.getElementById('txtPin').value;
    
    if(!rol || !pin) return;

    if(rol === 'zonal' || rol === 'audit') {
        if(pin === '3A2026') { // Clave genérica para admin
            document.getElementById('labelUser').innerText = rol === 'zonal' ? "MODO ZONAL" : "MODO AUDITORÍA";
            document.getElementById('viewTitle').innerText = "Validación de Solicitudes";
            document.getElementById('loginView').classList.add('exit-up');
            setTimeout(() => { document.getElementById('loginView').classList.remove('active'); document.getElementById('appView').classList.add('active'); }, 400);
        } else { alert("Clave admin incorrecta"); }
    } else {
        const t = dbTiendas.find(x => x.codigo == rol);
        if(t && t.pin == pin) {
            document.getElementById('labelUser').innerText = `📍 ${t.nombre}`;
            document.getElementById('loginView').classList.add('exit-up');
            setTimeout(() => { document.getElementById('loginView').classList.remove('active'); document.getElementById('appView').classList.add('active'); nuevaFila(); }, 400);
        } else { alert("PIN de tienda incorrecto"); }
    }
}

function nuevaFila() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>
            <div class="sku-group">
                <input type="text" class="sku-input" style="width:80px; background:none; border:none; border-bottom:1px solid #444; color:white;" placeholder="SKU" onblur="fetchProd(this)">
                <button class="btn-scan" onclick="abrirEscaner(this)">📷</button>
            </div>
        </td>
        <td class="td-desc" style="color:var(--text-dim); font-size:0.8rem;">---</td>
        <td><input type="number" class="qty-k" value="0" style="width:50px; background:none; border:none; color:white;" oninput="calc(this)"></td>
        <td><input type="number" class="qty-f" value="0" style="width:50px; background:none; border:none; color:white;" oninput="calc(this)"></td>
        <td class="td-diff"><span class="badge-diff">0</span></td>
    `;
    document.getElementById('tablaBody').appendChild(tr);
}

// LÓGICA DEL ESCÁNER
function abrirEscaner(btn) {
    inputActualParaScan = btn.parentElement.querySelector('.sku-input');
    document.getElementById('scanner-modal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
        (decodedText) => {
            inputActualParaScan.value = decodedText;
            fetchProd(inputActualParaScan);
            cerrarEscaner();
        }
    );
}

function cerrarEscaner() {
    if(html5QrCode) html5QrCode.stop();
    document.getElementById('scanner-modal').style.display = 'none';
}

async function fetchProd(input) {
    const sku = input.value;
    if(!sku) return;
    const r = await fetch(`${SB_URL}/rest/v1/productos?sku=eq.${sku}`, {
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const data = await r.json();
    const row = input.closest('tr');
    row.querySelector('.td-desc').innerText = data[0] ? data[0].descripcion : "❌";
    calc(input);
}

function calc(input) {
    const row = input.closest('tr');
    const k = parseFloat(row.querySelector('.qty-k').value) || 0;
    const f = parseFloat(row.querySelector('.qty-f').value) || 0;
    const d = f - k;
    const res = row.querySelector('.td-diff');
    res.innerHTML = `<span class="badge-diff ${d < 0 ? 'neg' : d > 0 ? 'pos' : ''}">${d}</span>`;
}

cargarTiendas();
</script>
</body>
</html>
